services:
  - type: web
    name: songpractice-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data/db
      - key: MEDIA_DIR
        value: /data/media
      - key: ALLOWED_ORIGINS
        value: https://practice.shammas.in,https://practice-g5s9.onrender.com
