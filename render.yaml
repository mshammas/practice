services:
  - type: web
    name: songpractice-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_DIR
        value: /data/db
      - key: MEDIA_DIR
        value: /data/media
      - key: ALLOWED_ORIGINS
        value: https://practice.shammas.in,https://practice-g5s9.onrender.com
